<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>شاشة مواعيد القمة العالمية للأمن والتقنية</title>
  <meta name="description" content="شاشة عرض استقبال لعداد وجدول مواعيد القمة العالمية للأمن والتقنية، مسابقة سيف، وشهر الأمن والتقنية." />
  <style>
    @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap");
    :root{
      --bg:#07171b;
      --bg-2:#102b31;
      --panel:rgba(8, 29, 34, .78);
      --panel-2:rgba(19, 49, 55, .72);
      --line:rgba(239,237,232,.20);
      --line-2:rgba(93,153,164,.42);
      --text:#efede8;
      --muted:rgba(239,237,232,.68);
      --cyan:#5d99a4;
      --cyan-2:#7ad1dc;
      --sand:#dad0ac;
      --peach:#e8b699;
      --white:#ffffff;
      --success:#9dd6bf;
      --shadow:0 24px 80px rgba(0,0,0,.42);
      --radius:28px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      color:var(--text);
      font-family:"IBM Plex Sans Arabic", "Tajawal", "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at 16% 18%, rgba(93,153,164,.38), transparent 32%),
        radial-gradient(circle at 82% 76%, rgba(232,182,153,.22), transparent 28%),
        linear-gradient(135deg, #05090b 0%, var(--bg) 42%, var(--bg-2) 100%);
      overflow:hidden;
      font-variant-numeric:tabular-nums;
      font-feature-settings:"tnum" 1;
    }

    body:before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.32;
      background:
        repeating-linear-gradient(90deg, rgba(255,255,255,.025) 0 1px, transparent 1px 14px),
        radial-gradient(circle at 70% 16%, rgba(218,208,172,.15), transparent 24%);
      mix-blend-mode:screen;
    }

    .screen{
      position:relative;
      z-index:1;
      height:100vh;
      width:100%;
      padding:clamp(18px, 2.15vw, 38px);
      display:flex;
      flex-direction:column;
      gap:clamp(12px, 1.6vh, 22px);
    }

    .topbar{
      height:clamp(64px, 9vh, 104px);
      min-height:64px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:24px;
      padding-bottom:clamp(10px, 1.25vh, 18px);
      border-bottom:1px solid rgba(239,237,232,.58);
    }

    .brand{
      display:flex;
      align-items:center;
      min-width:0;
    }

    .brand img{
      display:block;
      height:clamp(48px, 7.2vh, 82px);
      width:auto;
      object-fit:contain;
      filter:drop-shadow(0 8px 22px rgba(0,0,0,.35));
    }

    .screen-label{
      display:flex;
      align-items:center;
      gap:12px;
      color:var(--muted);
      font-size:clamp(13px, 1.2vw, 18px);
      letter-spacing:.2px;
      white-space:nowrap;
    }

    .pulse{
      width:11px;
      height:11px;
      border-radius:50%;
      background:var(--peach);
      box-shadow:0 0 0 8px rgba(232,182,153,.12), 0 0 24px rgba(232,182,153,.64);
    }

    .main{
      flex:1;
      min-height:0;
      display:grid;
      grid-template-columns:minmax(320px, .82fr) minmax(560px, 1.48fr);
      gap:clamp(14px, 1.8vw, 28px);
    }

    .card{
      position:relative;
      overflow:hidden;
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:linear-gradient(155deg, rgba(255,255,255,.08), rgba(255,255,255,.025)), var(--panel);
      box-shadow:var(--shadow);
      backdrop-filter:blur(20px);
    }

    .card:before{
      content:"";
      position:absolute;
      inset:-1px;
      pointer-events:none;
      background:radial-gradient(circle at 16% 0%, rgba(122,209,220,.24), transparent 34%), radial-gradient(circle at 92% 92%, rgba(232,182,153,.16), transparent 30%);
    }

    .countdown-card{
      min-height:0;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      gap:clamp(14px, 2vh, 24px);
      padding:clamp(22px, 2.5vw, 42px);
    }

    .kicker{
      position:relative;
      z-index:1;
      display:flex;
      align-items:center;
      gap:10px;
      color:var(--peach);
      font-size:clamp(14px, 1.1vw, 18px);
      font-weight:800;
    }

    .kicker:before{
      content:"";
      width:40px;
      height:2px;
      background:linear-gradient(90deg, transparent, var(--peach));
      border-radius:999px;
    }

    .next-content{
      position:relative;
      z-index:1;
    }

    .next-content h1{
      margin:clamp(12px, 1.2vh, 18px) 0 0;
      font-size:clamp(30px, 3.6vw, 70px);
      line-height:1.08;
      font-weight:900;
      letter-spacing:-.04em;
      max-width:10ch;
    }

    .date-badge{
      display:inline-flex;
      align-items:center;
      gap:12px;
      margin-top:clamp(16px, 2vh, 26px);
      padding:clamp(10px, 1.2vw, 16px) clamp(14px, 1.6vw, 22px);
      border:1px solid rgba(218,208,172,.35);
      border-radius:999px;
      color:var(--sand);
      background:rgba(218,208,172,.08);
      font-size:clamp(15px, 1.4vw, 22px);
      font-weight:800;
      white-space:nowrap;
    }

    .date-badge span{
      width:9px;
      height:9px;
      border-radius:50%;
      background:var(--cyan-2);
      box-shadow:0 0 18px rgba(122,209,220,.7);
    }

    .count-grid{
      position:relative;
      z-index:1;
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:clamp(10px, 1.2vw, 16px);
    }

    .count-box{
      min-height:clamp(86px, 13vh, 142px);
      border:1px solid rgba(93,153,164,.34);
      border-radius:22px;
      background:linear-gradient(180deg, rgba(93,153,164,.18), rgba(255,255,255,.035));
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      gap:4px;
    }

    .count-box strong{
      font-size:clamp(34px, 4.6vw, 82px);
      line-height:.95;
      font-weight:900;
      direction:ltr;
      color:var(--white);
      text-shadow:0 0 28px rgba(122,209,220,.26);
    }



    .count-box strong,
    .date-cell,
    #nextDate,
    #nowText{
      font-family:"IBM Plex Sans Arabic", "Segoe UI", Arial, sans-serif;
      font-variant-numeric:tabular-nums;
      font-feature-settings:"tnum" 1;
      unicode-bidi:plaintext;
    }

    .count-box span{
      color:var(--muted);
      font-size:clamp(12px, 1.05vw, 17px);
      font-weight:700;
    }

    .status-strip{
      position:relative;
      z-index:1;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:clamp(12px, 1.15vw, 18px);
      border:1px solid rgba(239,237,232,.14);
      border-radius:20px;
      background:rgba(0,0,0,.18);
      color:var(--muted);
      font-size:clamp(12px, 1vw, 16px);
    }

    .status-strip strong{
      color:var(--text);
      font-size:clamp(14px, 1.15vw, 18px);
    }

    .schedule-card{
      min-height:0;
      display:flex;
      flex-direction:column;
      padding:clamp(18px, 2vw, 32px);
    }

    .schedule-head{
      position:relative;
      z-index:1;
      display:grid;
      grid-template-columns:1fr auto;
      align-items:end;
      gap:20px;
      padding-bottom:clamp(12px, 1.3vh, 18px);
      border-bottom:1px solid rgba(239,237,232,.18);
    }

    .schedule-head h2{
      margin:0;
      font-size:clamp(24px, 2.6vw, 48px);
      line-height:1.1;
      font-weight:900;
      letter-spacing:-.035em;
    }

    .schedule-head .columns{
      display:grid;
      grid-template-columns:138px minmax(210px, 1fr) 96px;
      gap:12px;
      min-width:min(43vw, 560px);
      color:var(--muted);
      font-size:clamp(12px, .95vw, 15px);
      font-weight:800;
    }

    .rows{
      position:relative;
      z-index:1;
      flex:1;
      min-height:0;
      display:grid;
      grid-template-rows:repeat(10, minmax(0, 1fr));
      gap:clamp(6px, .8vh, 12px);
      padding-top:clamp(10px, 1.2vh, 18px);
    }

    .row{
      min-height:0;
      display:grid;
      grid-template-columns:138px minmax(0, 1fr) 96px;
      gap:12px;
      align-items:center;
      padding:clamp(7px, .85vh, 12px) clamp(10px, 1vw, 16px);
      border:1px solid rgba(239,237,232,.12);
      border-radius:18px;
      background:rgba(255,255,255,.045);
      transition:.25s ease;
    }

    .row.upcoming{
      border-color:rgba(93,153,164,.36);
      background:linear-gradient(90deg, rgba(93,153,164,.14), rgba(255,255,255,.045));
    }

    .row.today{
      border-color:rgba(232,182,153,.7);
      background:linear-gradient(90deg, rgba(232,182,153,.24), rgba(93,153,164,.12));
      box-shadow:0 0 0 1px rgba(232,182,153,.12) inset, 0 12px 34px rgba(232,182,153,.08);
    }

    .row.done{
      opacity:.55;
    }

    .row.summit{
      border-color:rgba(218,208,172,.62);
      background:linear-gradient(90deg, rgba(218,208,172,.24), rgba(93,153,164,.14));
    }

    .date-cell{
      color:var(--sand);
      font-weight:900;
      font-size:clamp(13px, 1.05vw, 18px);
      direction:ltr;
      text-align:right;
      white-space:nowrap;
    }

    .event-cell{
      min-width:0;
      font-size:clamp(14px, 1.25vw, 22px);
      font-weight:850;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .tag{
      justify-self:end;
      padding:7px 10px;
      min-width:78px;
      text-align:center;
      border-radius:999px;
      font-size:clamp(11px, .88vw, 14px);
      font-weight:850;
      color:var(--bg);
      background:var(--sand);
      white-space:nowrap;
    }

    .tag.future{background:var(--cyan-2)}
    .tag.today{background:var(--peach)}
    .tag.done{background:rgba(239,237,232,.55); color:#102025}
    .tag.summit{background:linear-gradient(90deg, var(--sand), var(--peach)); color:#102025}

    .decor-orbit{
      position:absolute;
      width:min(42vw, 640px);
      aspect-ratio:1;
      border:1px solid rgba(122,209,220,.14);
      border-radius:50%;
      left:-12vw;
      bottom:-42%;
      opacity:.55;
      pointer-events:none;
    }

    .decor-orbit:before,
    .decor-orbit:after{
      content:"";
      position:absolute;
      inset:9%;
      border:1px solid rgba(218,208,172,.12);
      border-radius:50%;
      transform:rotate(16deg);
    }

    .decor-orbit:after{
      inset:19%;
      border-color:rgba(232,182,153,.14);
      transform:rotate(-24deg);
    }

    @media (max-width:1100px){
      body{overflow:auto}
      .screen{height:auto; min-height:100vh}
      .main{grid-template-columns:1fr}
      .count-grid{grid-template-columns:repeat(4, 1fr)}
      .schedule-head .columns{display:none}
      .rows{grid-template-rows:none}
    }

    @media (max-height:760px) and (min-width:1101px){
      .screen{padding:16px; gap:10px}
      .topbar{height:68px; padding-bottom:10px}
      .countdown-card{padding:22px}
      .schedule-card{padding:18px}
      .count-box{min-height:86px}
      .next-content h1{font-size:clamp(28px, 3vw, 48px)}
      .row{border-radius:14px; padding-top:6px; padding-bottom:6px}
      .date-badge{margin-top:12px}
    }

    @media (max-width:680px){
      .topbar{align-items:flex-start; height:auto; flex-direction:column}
      .screen-label{white-space:normal}
      .count-grid{grid-template-columns:repeat(2, 1fr)}
      .schedule-head{grid-template-columns:1fr}
      .row{grid-template-columns:1fr; gap:6px}
      .tag{justify-self:start}
      .event-cell{white-space:normal}
    }
  </style>
</head>

      { date: "2026-12-18", display: "18/12/2026", title: "القمة العالمية للأمن والتقنية", summit: true }
    ];

    const unifiedNum = new Intl.NumberFormat("en-US", { useGrouping:false, numberingSystem:"latn" });
    const arDate = new Intl.DateTimeFormat("ar-SA-u-ca-gregory-nu-latn", { timeZone:"Asia/Riyadh", weekday:"long", day:"2-digit", month:"long", year:"numeric" });
    const arTime = new Intl.DateTimeFormat("ar-SA-u-ca-gregory-nu-latn", { timeZone:"Asia/Riyadh", hour:"2-digit", minute:"2-digit", second:"2-digit", hour12:true });

    const startOfDate = (dateString) => new Date(`${dateString}T00:00:00+03:00`);
    const endOfDate = (dateString) => new Date(`${dateString}T23:59:59+03:00`);
    const pad = (value) => unifiedNum.format(value).padStart(2, "0");

    function statusFor(event, now){
      const start = startOfDate(event.date);
      const end = endOfDate(event.date);
      if(now < start) return { label:"قادم", cls:"future" };
      if(now <= end) return { label:"اليوم", cls:"today" };
      return { label:"مكتمل", cls:"done" };
    }

    function renderRows(now){
      const container = document.getElementById("scheduleRows");
      container.innerHTML = events.map((event) => {
        const status = statusFor(event, now);
        const rowClass = [status.cls === "future" ? "upcoming" : status.cls, event.summit ? "summit" : ""].join(" ").trim();
        const tagClass = event.summit ? "summit" : status.cls;
        return `
          <div class="row ${rowClass}">
            <div class="date-cell">${event.display}</div>
            <div class="event-cell">${event.title}</div>
            <div class="tag ${tagClass}">${status.label}</div>
          </div>
        `;
      }).join("");
    }

    function updateCountdown(){
      const now = new Date();
      const next = events.find((event) => endOfDate(event.date) >= now) || events[events.length - 1];
      const nextStart = startOfDate(next.date);
      let diff = Math.max(0, nextStart - now);

      const d = Math.floor(diff / 86400000);
      diff -= d * 86400000;
      const h = Math.floor(diff / 3600000);
      diff -= h * 3600000;
      const m = Math.floor(diff / 60000);
      diff -= m * 60000;
      const s = Math.floor(diff / 1000);

      document.getElementById("nextTitle").textContent = next.title;
      document.getElementById("nextDate").textContent = arDate.format(nextStart);
      document.getElementById("days").textContent = unifiedNum.format(d).padStart(2, "0");
      document.getElementById("hours").textContent = pad(h);
      document.getElementById("minutes").textContent = pad(m);
      document.getElementById("seconds").textContent = pad(s);
      document.getElementById("nextStatus").textContent = statusFor(next, now).label;
      document.getElementById("nowText").textContent = `${arDate.format(now)}، ${arTime.format(now)}`;

      renderRows(now);
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
