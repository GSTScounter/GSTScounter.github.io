<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>شاشة مواعيد القمة العالمية للأمن والتقنية</title>
  <meta name="description" content="شاشة عرض استقبال لعداد وجدول مواعيد القمة العالمية للأمن والتقنية." />
  <style>
    @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap");

    :root{
      --bg:#061215;
      --bg-2:#102b31;
      --panel:rgba(9, 28, 33, .78);
      --panel-2:rgba(16, 43, 49, .82);
      --line:rgba(239,237,232,.18);
      --line-2:rgba(93,153,164,.38);
      --text:#efede8;
      --muted:rgba(239,237,232,.66);
      --cyan:#5d99a4;
      --cyan-2:#7ad1dc;
      --sand:#dad0ac;
      --peach:#e8b699;
      --white:#ffffff;
      --shadow:0 24px 72px rgba(0,0,0,.42);
      --radius:24px;
    }

    *{box-sizing:border-box}
    html,body{height:100%; width:100%}
    html{-webkit-text-size-adjust:100%}
    body{
      margin:0;
      overflow:hidden;
      color:var(--text);
      font-family:"IBM Plex Sans Arabic", "Segoe UI", Tahoma, Arial, sans-serif;
      font-variant-numeric:tabular-nums;
      font-feature-settings:"tnum" 1;
      background:
        radial-gradient(circle at 12% 16%, rgba(93,153,164,.34), transparent 30%),
        radial-gradient(circle at 82% 84%, rgba(232,182,153,.18), transparent 27%),
        linear-gradient(135deg, #020607 0%, var(--bg) 44%, var(--bg-2) 100%);
    }

    body:before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.26;
      background:
        repeating-linear-gradient(90deg, rgba(255,255,255,.028) 0 1px, transparent 1px 15px),
        radial-gradient(circle at 62% 10%, rgba(218,208,172,.14), transparent 25%);
      mix-blend-mode:screen;
    }

    .screen{
      position:relative;
      z-index:1;
      width:100%;
      height:100dvh;
      min-height:540px;
      padding:clamp(12px, 1.55vw, 24px);
      display:grid;
      grid-template-rows:auto 1fr;
      gap:clamp(8px, 1.15vh, 14px);
    }

    .topbar{
      height:clamp(48px, 7vh, 74px);
      display:grid;
      grid-template-columns:1fr auto 1fr;
      align-items:center;
      gap:18px;
      padding:0 clamp(6px, .8vw, 12px) clamp(8px, 1vh, 12px);
      border-bottom:1px solid rgba(239,237,232,.48);
    }

    .brand{
      justify-self:center;
      display:flex;
      align-items:center;
      justify-content:center;
      min-width:0;
    }

    .brand img{
      display:block;
      height:clamp(38px, 5.8vh, 62px);
      max-width:min(32vw, 420px);
      width:auto;
      object-fit:contain;
      filter:drop-shadow(0 10px 22px rgba(0,0,0,.34));
    }

    .screen-label,
    .clock{
      display:flex;
      align-items:center;
      gap:10px;
      color:var(--muted);
      font-size:clamp(12px, 1vw, 16px);
      font-weight:650;
      white-space:nowrap;
      min-width:0;
    }

    .screen-label{justify-self:start}
    .clock{justify-self:end; direction:rtl}

    .pulse{
      flex:0 0 auto;
      width:10px;
      height:10px;
      border-radius:50%;
      background:var(--cyan-2);
      box-shadow:0 0 0 8px rgba(122,209,220,.1), 0 0 24px rgba(122,209,220,.72);
    }

    .main{
      min-height:0;
      display:grid;
      grid-template-columns:minmax(340px, .78fr) minmax(520px, 1.22fr);
      gap:clamp(10px, 1.35vw, 18px);
      direction:rtl;
    }

    .card{
      position:relative;
      overflow:hidden;
      min-width:0;
      min-height:0;
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:linear-gradient(155deg, rgba(255,255,255,.08), rgba(255,255,255,.024)), var(--panel);
      box-shadow:var(--shadow);
      backdrop-filter:blur(18px);
    }

    .card:before{
      content:"";
      position:absolute;
      inset:-1px;
      pointer-events:none;
      background:
        radial-gradient(circle at 14% 0%, rgba(122,209,220,.22), transparent 32%),
        radial-gradient(circle at 96% 98%, rgba(232,182,153,.14), transparent 31%);
    }

    .countdown-card{
      display:grid;
      grid-template-rows:auto 1fr auto;
      gap:clamp(10px, 1.7vh, 18px);
      padding:clamp(16px, 2vw, 30px);
    }

    .next-content{
      position:relative;
      z-index:1;
      min-width:0;
    }

    .kicker{
      display:flex;
      align-items:center;
      gap:10px;
      color:var(--peach);
      font-size:clamp(13px, 1.05vw, 17px);
      font-weight:900;
      line-height:1;
    }

    .kicker:before{
      content:"";
      width:34px;
      height:2px;
      border-radius:999px;
      background:linear-gradient(90deg, transparent, var(--peach));
    }

    .next-content h1{
      margin:clamp(12px, 2.1vh, 22px) 0 0;
      font-size:clamp(34px, 4.1vw, 64px);
      line-height:1.04;
      font-weight:900;
      letter-spacing:-.045em;
      text-wrap:balance;
    }

    .date-badge{
      display:inline-flex;
      align-items:center;
      gap:11px;
      max-width:100%;
      margin-top:clamp(13px, 2vh, 22px);
      padding:clamp(9px, 1vw, 14px) clamp(14px, 1.4vw, 20px);
      border:1px solid rgba(218,208,172,.34);
      border-radius:999px;
      color:var(--sand);
      background:rgba(218,208,172,.08);
      font-size:clamp(14px, 1.25vw, 20px);
      font-weight:850;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .date-badge span{
      flex:0 0 auto;
      width:9px;
      height:9px;
      border-radius:50%;
      background:var(--cyan-2);
      box-shadow:0 0 18px rgba(122,209,220,.75);
    }

    .count-grid{
      position:relative;
      z-index:1;
      display:grid;
      grid-template-columns:repeat(4, minmax(0, 1fr));
      gap:clamp(7px, .9vw, 12px);
      align-self:end;
    }

    .count-box{
      min-width:0;
      min-height:clamp(74px, 13vh, 116px);
      border:1px solid rgba(93,153,164,.37);
      border-radius:20px;
      background:linear-gradient(180deg, rgba(93,153,164,.18), rgba(255,255,255,.036));
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      gap:3px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.08);
    }

    .count-box strong{
      color:var(--white);
      font-size:clamp(24px, 3.1vw, 50px);
      line-height:.95;
      font-weight:900;
      direction:ltr;
      text-shadow:0 0 24px rgba(122,209,220,.28);
    }

    .count-box span{
      color:var(--muted);
      font-size:clamp(11px, .95vw, 15px);
      font-weight:800;
      line-height:1.15;
    }

    .support-line{
      position:relative;
      z-index:1;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding-top:2px;
      color:var(--muted);
      font-size:clamp(12px, .95vw, 15px);
      font-weight:700;
    }

    .support-line strong{color:var(--text); font-weight:850}

    .schedule-card{
      display:grid;
      grid-template-rows:auto 1fr;
      padding:clamp(14px, 1.6vw, 24px);
    }

    .schedule-head{
      position:relative;
      z-index:1;
      display:grid;
      grid-template-columns:1fr auto;
      align-items:end;
      gap:18px;
      padding-bottom:clamp(8px, 1vh, 12px);
      border-bottom:1px solid rgba(239,237,232,.18);
    }

    .schedule-head h2{
      margin:0;
      font-size:clamp(24px, 2.45vw, 42px);
      line-height:1.08;
      font-weight:900;
      letter-spacing:-.04em;
    }

    .schedule-head .hint{
      color:var(--muted);
      font-size:clamp(11px, .88vw, 14px);
      font-weight:800;
      white-space:nowrap;
    }

    .rows{
      position:relative;
      z-index:1;
      min-height:0;
      display:grid;
      grid-template-rows:repeat(10, minmax(0, 1fr));
      gap:clamp(4px, .55vh, 8px);
      padding-top:clamp(7px, .9vh, 11px);
    }

    .row{
      min-height:0;
      display:grid;
      grid-template-columns:126px minmax(0, 1fr) 78px;
      gap:10px;
      align-items:center;
      padding:clamp(5px, .68vh, 9px) clamp(10px, 1vw, 14px);
      border:1px solid rgba(239,237,232,.12);
      border-radius:14px;
      background:rgba(255,255,255,.043);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.045);
    }

    .row.upcoming{
      border-color:rgba(93,153,164,.34);
      background:linear-gradient(90deg, rgba(93,153,164,.13), rgba(255,255,255,.043));
    }

    .row.today{
      border-color:rgba(232,182,153,.7);
      background:linear-gradient(90deg, rgba(232,182,153,.24), rgba(93,153,164,.12));
      box-shadow:0 0 0 1px rgba(232,182,153,.11) inset, 0 12px 30px rgba(232,182,153,.08);
    }

    .row.done{opacity:.48}

    .row.summit{
      border-color:rgba(218,208,172,.62);
      background:linear-gradient(90deg, rgba(218,208,172,.24), rgba(93,153,164,.14));
    }

    .date-cell,
    #days,
    #hours,
    #minutes,
    #seconds,
    #nextDate,
    #nowText{
      font-family:"IBM Plex Sans Arabic", "Segoe UI", Tahoma, Arial, sans-serif;
      font-variant-numeric:tabular-nums;
      font-feature-settings:"tnum" 1;
      unicode-bidi:plaintext;
    }

    .date-cell{
      color:var(--sand);
      font-weight:900;
      font-size:clamp(13px, 1.04vw, 17px);
      direction:ltr;
      text-align:right;
      white-space:nowrap;
    }

    .event-cell{
      min-width:0;
      font-size:clamp(13px, 1.12vw, 20px);
      font-weight:850;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .tag{
      justify-self:end;
      width:72px;
      padding:5px 8px 6px;
      text-align:center;
      border-radius:999px;
      font-size:clamp(10px, .82vw, 13px);
      line-height:1.1;
      font-weight:850;
      color:#082025;
      background:var(--sand);
      white-space:nowrap;
    }

    .tag.future{background:var(--cyan-2)}
    .tag.today{background:var(--peach)}
    .tag.done{background:rgba(239,237,232,.55); color:#102025}
    .tag.summit{background:linear-gradient(90deg, var(--sand), var(--peach)); color:#102025}

    .decor-orbit{
      position:absolute;
      width:min(42vw, 560px);
      aspect-ratio:1;
      border:1px solid rgba(122,209,220,.13);
      border-radius:50%;
      left:-13vw;
      bottom:-42%;
      opacity:.48;
      pointer-events:none;
    }

    .decor-orbit:before,
    .decor-orbit:after{
      content:"";
      position:absolute;
      inset:9%;
      border:1px solid rgba(218,208,172,.12);
      border-radius:50%;
      transform:rotate(16deg);
    }

    .decor-orbit:after{
      inset:20%;
      border-color:rgba(232,182,153,.14);
      transform:rotate(-24deg);
    }

    @media (max-height:760px) and (min-width:980px){
      .screen{padding:10px; gap:7px; min-height:0}
      .topbar{height:45px; padding-bottom:6px}
      .brand img{height:36px; max-width:280px}
      .screen-label,.clock{font-size:11px}
      .pulse{width:8px; height:8px; box-shadow:0 0 0 6px rgba(122,209,220,.09), 0 0 18px rgba(122,209,220,.68)}
      .main{grid-template-columns:minmax(300px, .74fr) minmax(520px, 1.26fr); gap:8px}
      .countdown-card{padding:13px; gap:8px; border-radius:18px}
      .schedule-card{padding:12px; border-radius:18px}
      .kicker{font-size:12px}
      .kicker:before{width:24px}
      .next-content h1{font-size:clamp(28px, 3.2vw, 42px); margin-top:10px; line-height:1.04}
      .date-badge{margin-top:10px; padding:7px 12px; font-size:13px}
      .date-badge span{width:7px; height:7px}
      .count-grid{gap:6px}
      .count-box{min-height:58px; border-radius:14px}
      .count-box strong{font-size:clamp(20px, 2.4vw, 34px)}
      .count-box span{font-size:10.5px}
      .support-line{font-size:11px}
      .schedule-head{padding-bottom:7px}
      .schedule-head h2{font-size:26px}
      .schedule-head .hint{font-size:11px}
      .rows{gap:4px; padding-top:7px}
      .row{grid-template-columns:112px minmax(0, 1fr) 62px; gap:7px; padding:4px 9px; border-radius:10px}
      .date-cell{font-size:12.5px}
      .event-cell{font-size:14px}
      .tag{width:58px; padding:4px 6px; font-size:10.5px}
    }

    @media (min-width:1400px) and (min-height:850px){
      .row{grid-template-columns:154px minmax(0, 1fr) 90px}
      .event-cell{font-size:clamp(17px, 1.18vw, 24px)}
      .date-cell{font-size:clamp(16px, 1.05vw, 22px)}
      .count-box{min-height:128px}
      .count-box strong{font-size:clamp(40px, 3vw, 68px)}
    }

    @media (max-width:960px){
      body{overflow:auto}
      .screen{height:auto; min-height:100dvh}
      .topbar{grid-template-columns:1fr; height:auto; justify-items:center; text-align:center}
      .screen-label,.clock{justify-self:center; white-space:normal}
      .main{grid-template-columns:1fr}
      .rows{grid-template-rows:none}
    }
  </style>
</head>
<body>
  <div class="screen">
    <header class="topbar" aria-label="رأس الشاشة">
      <div class="clock"><span class="pulse"></span><span id="nowText">جاري تحديث الوقت</span></div>
      <div class="brand">
        <img src="assets/gsts-logo-mixed.png" alt="GSTS Global Security and Technology Summit" />
      </div>
      <div class="screen-label">شاشة مواعيد القمة العالمية للأمن والتقنية</div>
    </header>

    <main class="main" aria-label="شاشة العد التنازلي وجدول المواعيد">
      <section class="card countdown-card" aria-label="عداد الموعد القادم">
        <div class="decor-orbit"></div>
        <div class="next-content">
          <div class="kicker">الموعد القادم</div>
          <h1 id="nextTitle">جاري حساب الموعد</h1>
          <div class="date-badge"><span></span><strong id="nextDate">...</strong></div>
        </div>

        <div class="count-grid" aria-label="العد التنازلي">
          <div class="count-box"><strong id="days">00</strong><span>يوم</span></div>
          <div class="count-box"><strong id="hours">00</strong><span>ساعة</span></div>
          <div class="count-box"><strong id="minutes">00</strong><span>دقيقة</span></div>
          <div class="count-box"><strong id="seconds">00</strong><span>ثانية</span></div>
        </div>

        <div class="support-line">
          <span>الحالة</span>
          <strong id="nextStatus">قادم</strong>
        </div>
      </section>

      <section class="card schedule-card" aria-label="جدول المواعيد">
        <div class="schedule-head">
          <h2>جدول المواعيد المهمة</h2>
          <div class="hint">عرض مخصص لشاشة الاستقبال</div>
        </div>
        <div class="rows" id="scheduleRows"></div>
      </section>
    </main>
  </div>

  <script>
    const events = [
      { date: "2026-07-05", display: "05/07/2026", title: "إعلان مسابقة سيف" },
      { date: "2026-07-12", display: "12/07/2026", title: "إعلان شهر الأمن والتقنية والقمة" },
      { date: "2026-10-01", display: "01/10/2026", title: "إغلاق التسجيل في مسابقة سيف" },
      { date: "2026-10-04", display: "04/10/2026", title: "الفرز الأولي لمسابقة سيف" },
      { date: "2026-10-08", display: "08/10/2026", title: "إغلاق باب التسجيل في شهر الأمن والتقنية" },
      { date: "2026-10-18", display: "18/10/2026", title: "تحكيم مشاريع مسابقة سيف" },
      { date: "2026-11-01", display: "01/11/2026", title: "بدء شهر الأمن والتقنية" },
      { date: "2026-11-19", display: "19/11/2026", title: "التصفيات النهائية لمسابقة سيف" },
      { date: "2026-11-30", display: "30/11/2026", title: "انتهاء شهر الأمن والتقنية" },
      { date: "2026-12-18", display: "18/12/2026", title: "القمة العالمية للأمن والتقنية", summit: true }
    ];

    const unifiedNum = new Intl.NumberFormat("en-US", { useGrouping:false, numberingSystem:"latn" });
    const arDate = new Intl.DateTimeFormat("ar-SA-u-ca-gregory-nu-latn", { timeZone:"Asia/Riyadh", weekday:"long", day:"2-digit", month:"long", year:"numeric" });
    const arTime = new Intl.DateTimeFormat("ar-SA-u-ca-gregory-nu-latn", { timeZone:"Asia/Riyadh", hour:"2-digit", minute:"2-digit", second:"2-digit", hour12:true });

    const startOfDate = (dateString) => new Date(`${dateString}T00:00:00+03:00`);
    const endOfDate = (dateString) => new Date(`${dateString}T23:59:59+03:00`);
    const pad = (value) => unifiedNum.format(value).padStart(2, "0");

    function statusFor(event, now){
      const start = startOfDate(event.date);
      const end = endOfDate(event.date);
      if(now < start) return { label:"قادم", cls:"future" };
      if(now <= end) return { label:"اليوم", cls:"today" };
      return { label:"مكتمل", cls:"done" };
    }

    function renderRows(now){
      const container = document.getElementById("scheduleRows");
      container.innerHTML = events.map((event) => {
        const status = statusFor(event, now);
        const rowClass = [status.cls === "future" ? "upcoming" : status.cls, event.summit ? "summit" : ""].join(" ").trim();
        const tagClass = event.summit ? "summit" : status.cls;
        return `
          <div class="row ${rowClass}">
            <div class="date-cell">${event.display}</div>
            <div class="event-cell">${event.title}</div>
            <div class="tag ${tagClass}">${status.label}</div>
          </div>
        `;
      }).join("");
    }

    function updateCountdown(){
      const now = new Date();
      const next = events.find((event) => endOfDate(event.date) >= now) || events[events.length - 1];
      const nextStart = startOfDate(next.date);
      let diff = Math.max(0, nextStart - now);

      const d = Math.floor(diff / 86400000);
      diff -= d * 86400000;
      const h = Math.floor(diff / 3600000);
      diff -= h * 3600000;
      const m = Math.floor(diff / 60000);
      diff -= m * 60000;
      const s = Math.floor(diff / 1000);

      document.getElementById("nextTitle").textContent = next.title;
      document.getElementById("nextDate").textContent = arDate.format(nextStart);
      document.getElementById("days").textContent = unifiedNum.format(d).padStart(2, "0");
      document.getElementById("hours").textContent = pad(h);
      document.getElementById("minutes").textContent = pad(m);
      document.getElementById("seconds").textContent = pad(s);
      document.getElementById("nextStatus").textContent = statusFor(next, now).label;
      document.getElementById("nowText").textContent = `${arDate.format(now)}، ${arTime.format(now)}`;

      renderRows(now);
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
